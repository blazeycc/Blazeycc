name: Gumroad Pro License

on:
  # Triggered via repository_dispatch from webhook relay
  repository_dispatch:
    types: [gumroad_sale]
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      buyer_email:
        description: 'Buyer email address'
        required: true
      buyer_name:
        description: 'Buyer name'
        required: false
        default: 'Customer'

jobs:
  send-license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Get Buyer Info
        id: buyer
        run: |
          # For Gumroad webhook via repository_dispatch
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            BUYER_EMAIL="${{ github.event.client_payload.email }}"
            BUYER_NAME="${{ github.event.client_payload.full_name }}"
            PRODUCT="${{ github.event.client_payload.product_name }}"
            ORDER_ID="${{ github.event.client_payload.sale_id }}"
          fi
          
          # For manual workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BUYER_EMAIL="${{ github.event.inputs.buyer_email }}"
            BUYER_NAME="${{ github.event.inputs.buyer_name }}"
            PRODUCT="Blazeycc Pro (Manual)"
            ORDER_ID="manual-$(date +%s)"
          fi
          
          echo "email=$BUYER_EMAIL" >> $GITHUB_OUTPUT
          echo "name=$BUYER_NAME" >> $GITHUB_OUTPUT
          echo "product=$PRODUCT" >> $GITHUB_OUTPUT
          echo "order_id=$ORDER_ID" >> $GITHUB_OUTPUT
      
      - name: Generate License Key
        id: generate
        env:
          LICENSE_SECRET: ${{ secrets.LICENSE_SECRET }}
        run: |
          BUYER_EMAIL="${{ steps.buyer.outputs.email }}"
          
          # Use secret or default (for testing)
          SECRET="${LICENSE_SECRET:-blazeycc-pro-2026-change-this-secret}"
          
          # Generate HMAC-SHA256 hash
          HASH=$(echo -n "$BUYER_EMAIL" | openssl dgst -sha256 -hmac "$SECRET" | cut -d' ' -f2)
          
          # Format as XXXX-XXXX-XXXX-XXXX (use first 16 chars of hash)
          LICENSE_KEY=$(echo "${HASH:0:16}" | tr '[:lower:]' '[:upper:]' | sed 's/\(....\)/\1-/g' | sed 's/-$//')
          
          echo "key=$LICENSE_KEY" >> $GITHUB_OUTPUT
      
      - name: Send License Email via SendGrid
        if: ${{ secrets.SENDGRID_API_KEY != '' }}
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          BUYER_EMAIL="${{ steps.buyer.outputs.email }}"
          BUYER_NAME="${{ steps.buyer.outputs.name }}"
          LICENSE_KEY="${{ steps.generate.outputs.key }}"
          ORDER_ID="${{ steps.buyer.outputs.order_id }}"
          
          # Send email via SendGrid API
          curl -s --request POST \
            --url https://api.sendgrid.com/v3/mail/send \
            --header "Authorization: Bearer $SENDGRID_API_KEY" \
            --header 'Content-Type: application/json' \
            --data '{
              "personalizations": [{
                "to": [{"email": "'"$BUYER_EMAIL"'", "name": "'"$BUYER_NAME"'"}],
                "subject": "🎉 Your Blazeycc Pro License Key"
              }],
              "from": {"email": "'"$FROM_EMAIL"'", "name": "Blazeycc"},
              "content": [{
                "type": "text/html",
                "value": "<h1>Thank you for purchasing Blazeycc Pro!</h1><p>Hi '"$BUYER_NAME"',</p><p>Here is your license key:</p><h2 style=\"background: #f0f0f0; padding: 20px; font-family: monospace; letter-spacing: 2px;\">'"$LICENSE_KEY"'</h2><p><strong>Order ID:</strong> '"$ORDER_ID"'</p><h3>Your Pro Features:</h3><ul><li>✅ No watermark on videos</li><li>✅ 4K export support</li><li>✅ Custom watermark with your own text</li><li>✅ Fast encoding (2x speed)</li><li>✅ Batch URL recording</li><li>✅ Scheduled recordings</li><li>✅ Cloud sync support</li></ul><p>To activate, open Blazeycc → Settings → Enter License Key</p><p>Enjoy!</p>"
              }]
            }'
          
          echo "✅ License email sent to $BUYER_EMAIL"
      
      - name: Log License Key
        run: |
          echo "============================================"
          echo "🎉 GUMROAD SALE - LICENSE GENERATED"
          echo "============================================"
          echo "Buyer:    ${{ steps.buyer.outputs.name }}"
          echo "Email:    ${{ steps.buyer.outputs.email }}"
          echo "Order:    ${{ steps.buyer.outputs.order_id }}"
          echo "Product:  ${{ steps.buyer.outputs.product }}"
          echo "Key:      ${{ steps.generate.outputs.key }}"
          echo "============================================"
          echo ""
          echo "If email wasn't sent automatically, send this key manually!"
